name: Auto Render Nybelic Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID'
        required: true
      format:
        description: 'Format (long | short | tiktok)'
        required: true
        default: 'long'
      assets_url:
        description: 'Manifest URL (https://nybelic.com/uploads/.../manifest.json)'
        required: true
      callback_url:
        description: 'Callback URL'
        required: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # ---------------------------------------------------------------
      # 1. SETUP
      # ---------------------------------------------------------------
      - name: Setup FFmpeg + jq + bc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg jq bc

      # ---------------------------------------------------------------
      # 2. FETCH ASSETS
      # ---------------------------------------------------------------
      - name: Fetch manifest + assets from Hostinger
        env:
          ASSETS_URL: ${{ inputs.assets_url }}
          JOB_ID: ${{ inputs.job_id }}
        run: |
          mkdir -p assets/${JOB_ID}/voice
          mkdir -p assets/${JOB_ID}/images
          mkdir -p assets/${JOB_ID}/characters
          BASE_URL=$(dirname "$ASSETS_URL")
          ORIGIN=$(echo "$ASSETS_URL" | sed -E 's|^(https?://[^/]+).*|\1|')

          curl -sL "$ASSETS_URL" -o "assets/${JOB_ID}/manifest.json" || echo '{}' > "assets/${JOB_ID}/manifest.json"

          # Voice: 8 scenes × 4 dialogs × 2 chars + cta (zzz_cta_nybel.mp3 = play paling akhir)
          for sceneIdx in 0 1 2 3 4 5 6 7; do
            for dialogIdx in 0 1 2 3; do
              for char in nybel nybelic; do
                fn=$(printf "scene%02d_dialog%02d_%s.mp3" $sceneIdx $dialogIdx $char)
                curl -sL -f -o "assets/${JOB_ID}/voice/$fn" "$BASE_URL/voice/$fn" 2>/dev/null || true
              done
            done
            fn=$(printf "scene%02d_bg.png" $sceneIdx)
            curl -sL -f -o "assets/${JOB_ID}/images/$fn" "$BASE_URL/images/$fn" 2>/dev/null || true
          done
          # CTA (zzz prefix supaya alphabetical sort di paling akhir)
          curl -sL -f -o "assets/${JOB_ID}/voice/zzz_cta_nybel.mp3" "$BASE_URL/voice/zzz_cta_nybel.mp3" 2>/dev/null || true
          # Backward compat
          curl -sL -f -o "assets/${JOB_ID}/voice/zzz_cta_nybel.mp3" "$BASE_URL/voice/cta_nybel.mp3" 2>/dev/null || true

          # Characters: 15 PNG dari Hostinger
          CHAR_BASE="${ORIGIN}/uploads/content-auto/characters"
          for f in nybel-idle nybel-talking nybel-thinking nybel-idea nybel-sad nybel-excited nybel-laughing nybel-pointing \
                   nybelic-idle nybelic-talking nybelic-thinking nybelic-excited nybelic-chill nybelic-laughing nybelic-sad; do
            curl -sL -f -o "assets/${JOB_ID}/characters/${f}.png" "${CHAR_BASE}/${f}.png" 2>/dev/null || true
          done

          # Cleanup file kosong / 404 HTML
          find "assets/${JOB_ID}" -size -1k -delete 2>/dev/null || true

          echo "=== Voice ==="; ls -la "assets/${JOB_ID}/voice/" 2>/dev/null || echo "(empty)"
          echo "=== Images ==="; ls -la "assets/${JOB_ID}/images/" 2>/dev/null || echo "(empty)"
          echo "=== Characters ==="; ls -la "assets/${JOB_ID}/characters/" 2>/dev/null || echo "(empty)"

      # ---------------------------------------------------------------
      # 3. RENDER PER-SCENE — biar background sync sama voice scene
      # ---------------------------------------------------------------
      - name: Render video with per-scene background sync + Ken Burns
        env:
          JOB_ID: ${{ inputs.job_id }}
          FORMAT: ${{ inputs.format }}
        run: |
          set -e
          mkdir -p output
          cd "assets/${JOB_ID}"

          # ----- Aspect ratio -----
          if [ "$FORMAT" = "long" ]; then
            W=1920; H=1080
          else
            W=1080; H=1920
          fi
          echo "Format=$FORMAT W=$W H=$H"

          # ----- Per-scene render: setiap scene buat slideshow.mp4 sendiri -----
          # Kumpulkan semua scene index yang punya voice
          SCENE_INDICES=$(ls voice/scene*.mp3 2>/dev/null | sed -E 's|.*scene([0-9]+)_.*|\1|' | sort -u)
          echo "Scenes detected: $SCENE_INDICES"

          if [ -z "$SCENE_INDICES" ]; then
            echo "⚠️  No scene voice files. Falling back to flat concat."
            SCENE_INDICES="00"
          fi

          rm -f scene-list.txt
          for sceneIdx in $SCENE_INDICES; do
            # Validate setiap MP3 dulu — skip yang corrupt
            VALID_MP3=()
            for mp3 in $(ls voice/scene${sceneIdx}_*.mp3 2>/dev/null | sort); do
              # Cek apakah MP3 valid: ffprobe harus return durasi > 0
              DUR=$(ffprobe -v error -analyzeduration 5000000 -probesize 5000000 -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$mp3" 2>/dev/null || echo "0")
              if [ -n "$DUR" ] && [ "$(echo "$DUR > 0.1" | bc 2>/dev/null || echo 0)" = "1" ]; then
                VALID_MP3+=("$mp3")
              else
                echo "⚠️  Skipping corrupt MP3: $mp3 (duration=$DUR)"
              fi
            done

            if [ ${#VALID_MP3[@]} -eq 0 ]; then
              echo "⚠️  Scene $sceneIdx: no valid MP3, skip"
              continue
            fi

            # Re-encode setiap MP3 ke format yang konsisten (44100Hz mono, 128kbps)
            # supaya concat aman, sekaligus fix invalid header
            > scene${sceneIdx}-voice-fixed.txt
            i=0
            for mp3 in "${VALID_MP3[@]}"; do
              FIXED="voice/scene${sceneIdx}_fixed_$i.mp3"
              ffmpeg -y -analyzeduration 5000000 -probesize 5000000 -i "$mp3" \
                -ar 44100 -ac 2 -b:a 128k -c:a libmp3lame "$FIXED" 2>/dev/null && \
                echo "file '$FIXED'" >> scene${sceneIdx}-voice-fixed.txt || \
                echo "⚠️  Re-encode failed: $mp3"
              i=$((i+1))
            done

            if [ ! -s scene${sceneIdx}-voice-fixed.txt ]; then
              echo "⚠️  Scene $sceneIdx: all re-encodes failed, skip"
              continue
            fi

            # Concat audio dari satu scene (pakai re-encoded files)
            ffmpeg -y -f concat -safe 0 -i scene${sceneIdx}-voice-fixed.txt -c copy scene${sceneIdx}_audio.mp3 || \
              ffmpeg -y -f concat -safe 0 -i scene${sceneIdx}-voice-fixed.txt -c:a libmp3lame -q:a 4 scene${sceneIdx}_audio.mp3

            SCENE_DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 scene${sceneIdx}_audio.mp3 || echo "3")
            SCENE_DUR_INT=$(printf "%.0f" "$SCENE_DUR")
            [ -z "$SCENE_DUR_INT" ] || [ "$SCENE_DUR_INT" -lt 2 ] && SCENE_DUR_INT=3

            # Background image untuk scene ini
            BG="images/scene${sceneIdx}_bg.png"
            if [ ! -f "$BG" ]; then
              # Fallback: pakai bg scene pertama yang ada
              BG=$(ls images/scene*_bg.png 2>/dev/null | head -1)
            fi

            # Render slideshow per scene dengan Ken Burns zoompan
            # Ken Burns: zoom dari 1.0 → 1.1 selama scene
            FPS=30
            TOTAL_FRAMES=$((SCENE_DUR_INT * FPS))
            if [ -f "$BG" ]; then
              ffmpeg -y -loop 1 -t $SCENE_DUR_INT -i "$BG" \
                -vf "scale=8000:-1,zoompan=z='min(zoom+0.0015,1.15)':d=${TOTAL_FRAMES}:s=${W}x${H}:fps=${FPS},setsar=1" \
                -c:v libx264 -pix_fmt yuv420p -preset fast -t $SCENE_DUR_INT scene${sceneIdx}_video.mp4
            else
              # Fallback solid color
              ffmpeg -y -f lavfi -i color=c=0x7c3aed:s=${W}x${H}:d=${SCENE_DUR_INT}:r=${FPS} \
                -c:v libx264 -pix_fmt yuv420p scene${sceneIdx}_video.mp4
            fi

            echo "file 'scene${sceneIdx}_video.mp4'" >> scene-list.txt
            echo "Scene ${sceneIdx}: ${SCENE_DUR_INT}s, BG=$BG"
          done

          # ----- Concat all scene videos -----
          if [ -s scene-list.txt ]; then
            ffmpeg -y -f concat -safe 0 -i scene-list.txt -c copy slideshow.mp4
          else
            echo "❌ No scenes generated"
            ffmpeg -y -f lavfi -i color=c=0x7c3aed:s=${W}x${H}:d=15:r=30 -c:v libx264 -pix_fmt yuv420p slideshow.mp4
          fi

          # ----- Concat all audio (scene order + cta paling akhir karena prefix zzz) -----
          # Validate + re-encode dulu setiap mp3 supaya gak ada corrupt header
          > voice-list-fixed.txt
          i=0
          for mp3 in $(ls voice/*.mp3 2>/dev/null | sort | grep -v "_fixed_"); do
            DUR=$(ffprobe -v error -analyzeduration 5000000 -probesize 5000000 -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$mp3" 2>/dev/null || echo "0")
            if [ -z "$DUR" ] || [ "$(echo "$DUR > 0.1" | bc 2>/dev/null || echo 0)" != "1" ]; then
              echo "⚠️  Skip invalid mp3 in full concat: $mp3"
              continue
            fi
            FIXED="voice/full_fixed_$i.mp3"
            ffmpeg -y -analyzeduration 5000000 -probesize 5000000 -i "$mp3" \
              -ar 44100 -ac 2 -b:a 128k -c:a libmp3lame "$FIXED" 2>/dev/null && \
              echo "file '$FIXED'" >> voice-list-fixed.txt
            i=$((i+1))
          done

          if [ -s voice-list-fixed.txt ]; then
            ffmpeg -y -f concat -safe 0 -i voice-list-fixed.txt -c copy full_audio.mp3 || \
              ffmpeg -y -f concat -safe 0 -i voice-list-fixed.txt -c:a libmp3lame -q:a 4 full_audio.mp3
          else
            ffmpeg -y -f lavfi -i anullsrc=r=44100:cl=stereo -t 15 -q:a 9 -acodec libmp3lame full_audio.mp3
          fi

          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 full_audio.mp3 || echo "0")
          DURATION_INT=$(printf "%.0f" "$DURATION")
          [ -z "$DURATION_INT" ] || [ "$DURATION_INT" -lt 15 ] && DURATION_INT=15
          echo "Total audio duration: ${DURATION_INT}s"

          # ----- Pick character files -----
          NYBEL_FILE="characters/nybel-talking.png"
          [ ! -f "$NYBEL_FILE" ] && NYBEL_FILE="characters/nybel-idle.png"
          [ ! -f "$NYBEL_FILE" ] && NYBEL_FILE=$(ls characters/nybel-*.png 2>/dev/null | head -1)

          NYBELIC_FILE="characters/nybelic-talking.png"
          [ ! -f "$NYBELIC_FILE" ] && NYBELIC_FILE="characters/nybelic-idle.png"
          [ ! -f "$NYBELIC_FILE" ] && NYBELIC_FILE=$(ls characters/nybelic-*.png 2>/dev/null | head -1)

          echo "Nybel = $NYBEL_FILE"
          echo "Nybelic = $NYBELIC_FILE"

          # ----- Layout integer math -----
          if [ "$FORMAT" = "long" ]; then
            H_NYBEL=$((H * 35 / 100))
            H_NYBELIC=$((H * 30 / 100))
            NYBEL_X=60
            NYBEL_Y_OFFSET=40
            NYBELIC_X_OFFSET=60
            NYBELIC_Y_OFFSET=40
            FONT_SIZE=56
          else
            H_NYBEL=$((H * 45 / 100))
            H_NYBELIC=$((H * 38 / 100))
            NYBEL_X=40
            NYBEL_Y_OFFSET=60
            NYBELIC_X_OFFSET=40
            NYBELIC_Y_OFFSET=60
            FONT_SIZE=72
          fi
          echo "Layout: H_NYBEL=$H_NYBEL H_NYBELIC=$H_NYBELIC"

          # ----- Title sanitize -----
          TITLE=$(jq -r '.title // "Nybelic"' manifest.json 2>/dev/null | head -c 60 | sed "s/['\"\\\\:]//g")
          [ -z "$TITLE" ] && TITLE="Nybelic"
          echo "Title: $TITLE"

          # ----- Add subtle bobbing animation pada karakter (sin wave 0-2px tiap detik) -----
          # Karakter "ngangguk" pelan supaya gak terlihat static
          NYBEL_BOB="0+5*sin(2*PI*t/2)"
          NYBELIC_BOB="0+5*sin(2*PI*t/1.5+1)"

          # ----- Final render with character overlay + bobbing animation -----
          if [ -f "$NYBEL_FILE" ] && [ -f "$NYBELIC_FILE" ]; then
            echo "Rendering with both characters + Ken Burns + bobbing"
            FILTER="[1:v]scale=-1:${H_NYBEL}[nybel];"
            FILTER="${FILTER}[2:v]scale=-1:${H_NYBELIC}[nybelic];"
            FILTER="${FILTER}[0:v][nybel]overlay=x=${NYBEL_X}:y='H-h-${NYBEL_Y_OFFSET}+${NYBEL_BOB}':shortest=0[bg1];"
            FILTER="${FILTER}[bg1][nybelic]overlay=x='W-w-${NYBELIC_X_OFFSET}':y='H-h-${NYBELIC_Y_OFFSET}+${NYBELIC_BOB}':shortest=0,"
            FILTER="${FILTER}drawtext=text='${TITLE}':fontsize=${FONT_SIZE}:fontcolor=white:borderw=4:bordercolor=black:x=(w-text_w)/2:y=80:enable='between(t,0,3)'[v]"

            ffmpeg -y \
              -i slideshow.mp4 \
              -loop 1 -t $DURATION_INT -i "$NYBEL_FILE" \
              -loop 1 -t $DURATION_INT -i "$NYBELIC_FILE" \
              -i full_audio.mp3 \
              -filter_complex "$FILTER" \
              -map "[v]" -map 3:a \
              -c:v libx264 -pix_fmt yuv420p -preset fast \
              -c:a aac -b:a 192k \
              -t $DURATION_INT \
              "../../output/${JOB_ID}.mp4"

          elif [ -f "$NYBEL_FILE" ]; then
            echo "Rendering with NYBEL only"
            FILTER="[1:v]scale=-1:${H_NYBEL}[nybel];"
            FILTER="${FILTER}[0:v][nybel]overlay=x=${NYBEL_X}:y='H-h-${NYBEL_Y_OFFSET}+${NYBEL_BOB}':shortest=0,"
            FILTER="${FILTER}drawtext=text='${TITLE}':fontsize=${FONT_SIZE}:fontcolor=white:borderw=4:bordercolor=black:x=(w-text_w)/2:y=80:enable='between(t,0,3)'[v]"

            ffmpeg -y \
              -i slideshow.mp4 \
              -loop 1 -t $DURATION_INT -i "$NYBEL_FILE" \
              -i full_audio.mp3 \
              -filter_complex "$FILTER" \
              -map "[v]" -map 2:a \
              -c:v libx264 -pix_fmt yuv420p -preset fast \
              -c:a aac -b:a 192k \
              -t $DURATION_INT \
              "../../output/${JOB_ID}.mp4"

          else
            echo "Rendering slideshow only"
            ffmpeg -y \
              -i slideshow.mp4 \
              -i full_audio.mp3 \
              -filter_complex "[0:v]drawtext=text='${TITLE}':fontsize=${FONT_SIZE}:fontcolor=white:borderw=4:bordercolor=black:x=(w-text_w)/2:y=80:enable='between(t,0,3)'[v]" \
              -map "[v]" -map 1:a \
              -c:v libx264 -pix_fmt yuv420p -preset fast \
              -c:a aac -b:a 192k \
              -t $DURATION_INT \
              "../../output/${JOB_ID}.mp4"
          fi

          ls -la "../../output/"
          ffprobe -v error -show_entries format=duration,size -of default=noprint_wrappers=1 "../../output/${JOB_ID}.mp4" || true
          echo "✅ Render complete"

      # ---------------------------------------------------------------
      # 4. UPLOAD TO HOSTINGER (optional)
      # ---------------------------------------------------------------
      - name: Upload to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASS }}
          FTP_PATH: ${{ secrets.HOSTINGER_FTP_PATH }}
          JOB_ID: ${{ inputs.job_id }}
        run: |
          if [ -n "$FTP_HOST" ] && [ -n "$FTP_USER" ] && [ -n "$FTP_PASS" ]; then
            REMOTE_DIR="${FTP_PATH:-public_html/uploads/content-auto/output}"
            curl -T "output/${JOB_ID}.mp4" \
              --user "${FTP_USER}:${FTP_PASS}" \
              --ftp-create-dirs \
              "ftp://${FTP_HOST}/${REMOTE_DIR}/${JOB_ID}.mp4" \
              && echo "✅ FTP upload OK" \
              || echo "⚠️  FTP upload failed (non-fatal)"
          else
            echo "⏭️  FTP secrets not configured, skip upload"
          fi

      # ---------------------------------------------------------------
      # 5. ARTIFACT
      # ---------------------------------------------------------------
      - name: Upload as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ inputs.job_id }}
          path: output/*.mp4
          retention-days: 7

      # ---------------------------------------------------------------
      # 6. CALLBACK
      # ---------------------------------------------------------------
      - name: Notify Hostinger callback
        if: always()
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          JOB_ID: ${{ inputs.job_id }}
        run: |
          if [ -n "$CALLBACK_URL" ]; then
            curl -sG "$CALLBACK_URL" \
              --data-urlencode "job_id=$JOB_ID" \
              --data-urlencode "status=${{ job.status }}" \
              --data-urlencode "run_id=${{ github.run_id }}" \
              || true
          fi
