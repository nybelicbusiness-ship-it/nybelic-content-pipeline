name: Auto Render Nybelic Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Job ID'
        required: true
      format:
        description: 'Format (long | short | tiktok)'
        required: true
        default: 'long'
      assets_url:
        description: 'Manifest URL (https://nybelic.com/uploads/.../manifest.json)'
        required: true
      callback_url:
        description: 'Callback URL'
        required: false

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # ===========================================================
      # 1. SETUP
      # ===========================================================
      - name: Setup FFmpeg + jq + bc + fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg jq bc fonts-noto-color-emoji fonts-dejavu fonts-noto-cjk

      # ===========================================================
      # 2. FETCH ASSETS
      # ===========================================================
      - name: Fetch manifest + assets from Hostinger
        env:
          ASSETS_URL: ${{ inputs.assets_url }}
          JOB_ID: ${{ inputs.job_id }}
        run: |
          mkdir -p assets/${JOB_ID}/voice
          mkdir -p assets/${JOB_ID}/images
          mkdir -p assets/${JOB_ID}/characters
          mkdir -p assets/${JOB_ID}/music
          BASE_URL=$(dirname "$ASSETS_URL")
          ORIGIN=$(echo "$ASSETS_URL" | sed -E 's|^(https?://[^/]+).*|\1|')

          curl -sL "$ASSETS_URL" -o "assets/${JOB_ID}/manifest.json" || echo '{}' > "assets/${JOB_ID}/manifest.json"

          # Voice files (per-dialog + cta)
          for sceneIdx in 0 1 2 3 4 5 6 7; do
            for dialogIdx in 0 1 2 3 4; do
              for char in nybel nybelic; do
                fn=$(printf "scene%02d_dialog%02d_%s.mp3" $sceneIdx $dialogIdx $char)
                curl -sL -f -o "assets/${JOB_ID}/voice/$fn" "$BASE_URL/voice/$fn" 2>/dev/null || true
              done
            done
            fn=$(printf "scene%02d_bg.png" $sceneIdx)
            curl -sL -f -o "assets/${JOB_ID}/images/$fn" "$BASE_URL/images/$fn" 2>/dev/null || true
          done
          curl -sL -f -o "assets/${JOB_ID}/voice/zzz_cta_nybel.mp3" "$BASE_URL/voice/zzz_cta_nybel.mp3" 2>/dev/null || true

          # Characters (15 PNG)
          CHAR_BASE="${ORIGIN}/uploads/content-auto/characters"
          for f in nybel-idle nybel-talking nybel-thinking nybel-idea nybel-sad nybel-excited nybel-laughing nybel-pointing \
                   nybelic-idle nybelic-talking nybelic-thinking nybelic-excited nybelic-chill nybelic-laughing nybelic-sad; do
            curl -sL -f -o "assets/${JOB_ID}/characters/${f}.png" "${CHAR_BASE}/${f}.png" 2>/dev/null || true
          done

          # Background music (lo-fi instrumental dari free CDN — kosong kalau gak ada)
          curl -sL -f -o "assets/${JOB_ID}/music/bgm.mp3" \
            "${ORIGIN}/uploads/content-auto/music/bgm.mp3" 2>/dev/null || true

          # Cleanup file kecil/404
          find "assets/${JOB_ID}" -size -1k -delete 2>/dev/null || true

          echo "=== Voice ==="; ls -la "assets/${JOB_ID}/voice/" 2>/dev/null
          echo "=== Images ==="; ls -la "assets/${JOB_ID}/images/" 2>/dev/null
          IMG_CNT=$(ls assets/${JOB_ID}/images/*.png 2>/dev/null | wc -l)
          echo "Image count: $IMG_CNT"
          echo "=== Characters ==="; ls -la "assets/${JOB_ID}/characters/" 2>/dev/null
          echo "=== Music ==="; ls -la "assets/${JOB_ID}/music/" 2>/dev/null

      # ===========================================================
      # 3. RENDER PER-DIALOG (Kok-Bisa style)
      # ===========================================================
      - name: Render Kok-Bisa style video
        env:
          JOB_ID: ${{ inputs.job_id }}
          FORMAT: ${{ inputs.format }}
        run: |
          set -e
          mkdir -p output
          cd "assets/${JOB_ID}"

          # ----- Aspect ratio -----
          if [ "$FORMAT" = "long" ]; then
            W=1920; H=1080; FONT_BIG=72; FONT_CAP=42; FONT_NAME=32
            CHAR_W_PCT=22; SUB_HEIGHT=180
          else
            W=1080; H=1920; FONT_BIG=82; FONT_CAP=48; FONT_NAME=36
            CHAR_W_PCT=42; SUB_HEIGHT=240
          fi
          FPS=30
          FONT_PATH="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          [ ! -f "$FONT_PATH" ] && FONT_PATH=$(fc-match -f '%{file}' DejaVuSans:Bold 2>/dev/null || echo "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf")

          BRAND_PRIMARY=$(jq -r '.brand_color_primary // "#7c3aed"' manifest.json | sed 's/#//')
          BRAND_SECONDARY=$(jq -r '.brand_color_secondary // "#ec4899"' manifest.json | sed 's/#//')
          BRAND_ACCENT=$(jq -r '.brand_color_accent // "#f59e0b"' manifest.json | sed 's/#//')
          TITLE=$(jq -r '.title // "Nybelic"' manifest.json | head -c 80 | sed "s/['\"\\\\:]//g")
          [ -z "$TITLE" ] && TITLE="Nybelic"
          CHANNEL=$(jq -r '.channel_name // "NYBELIC"' manifest.json)
          WEBSITE=$(jq -r '.website // "nybelic.com"' manifest.json)
          echo "Format=$FORMAT W=$W H=$H Title=$TITLE"

          # ===========================================================
          # 3.1 Pre-process: re-encode all MP3 ke 44100Hz stereo 128k
          # (skip kalau gagal, original tetap dipakai)
          # ===========================================================
          mkdir -p voice/fixed
          REENCODE_OK=0
          REENCODE_SKIP=0
          for mp3 in $(ls voice/*.mp3 2>/dev/null | grep -v "/fixed/"); do
            DUR=$(ffprobe -v error -analyzeduration 5000000 -probesize 5000000 -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$mp3" 2>/dev/null || echo "0")
            VALID=$(echo "$DUR > 0.1" | bc 2>/dev/null || echo 0)
            if [ "$VALID" != "1" ]; then
              echo "⚠️  Removing corrupt MP3: $mp3 (dur=$DUR)"
              rm -f "$mp3"
              continue
            fi
            FIXED="voice/fixed/$(basename "$mp3")"
            if ffmpeg -y -analyzeduration 5000000 -probesize 5000000 -i "$mp3" \
                -ar 44100 -ac 2 -b:a 128k -c:a libmp3lame "$FIXED" 2>/dev/null; then
              cp -f "$FIXED" "$mp3"
              REENCODE_OK=$((REENCODE_OK+1))
            else
              REENCODE_SKIP=$((REENCODE_SKIP+1))
            fi
          done
          echo "Re-encode: ok=$REENCODE_OK skip=$REENCODE_SKIP (skip pakai original)"

          # ===========================================================
          # 3.2 Build TITLE CARD (3 detik intro)
          # ===========================================================
          # Pakai textfile supaya aman dari karakter khusus
          printf '%s' "$TITLE" > title_text.txt
          printf '@%s' "$CHANNEL" > channel_text.txt
          printf '%s' "$WEBSITE" > website_text.txt

          ffmpeg -y \
            -f lavfi -i "gradients=size=${W}x${H}:duration=3:speed=0.05:c0=0x${BRAND_PRIMARY}:c1=0x${BRAND_SECONDARY}:c2=0x${BRAND_ACCENT}:r=${FPS}" \
            -vf "drawtext=textfile=title_text.txt:fontfile='${FONT_PATH}':fontsize=${FONT_BIG}:fontcolor=white:borderw=6:bordercolor=black@0.5:x=(w-text_w)/2:y=(h-text_h)/2-60:line_spacing=15,drawtext=textfile=channel_text.txt:fontfile='${FONT_PATH}':fontsize=${FONT_NAME}:fontcolor=white@0.85:x=(w-text_w)/2:y=(h-text_h)/2+80,drawtext=textfile=website_text.txt:fontfile='${FONT_PATH}':fontsize=${FONT_NAME}:fontcolor=white@0.7:x=(w-text_w)/2:y=h-100" \
            -t 3 -c:v libx264 -pix_fmt yuv420p -preset fast title_card.mp4

          # Silent audio untuk title card
          ffmpeg -y -f lavfi -i anullsrc=r=44100:cl=stereo -t 3 -q:a 9 -acodec libmp3lame title_card_audio.mp3

          # ===========================================================
          # 3.3 Render setiap DIALOG sebagai shot pendek
          # ===========================================================
          rm -f shots-list.txt
          rm -f audio-list.txt
          echo "file 'title_card.mp4'" >> shots-list.txt
          echo "file 'title_card_audio.mp3'" >> audio-list.txt

          # Loop semua scene di timeline
          SCENE_COUNT=$(jq '.timeline | length' manifest.json)
          echo "Total scenes: $SCENE_COUNT"

          shotIdx=0
          for sceneIdx in $(seq 0 $((SCENE_COUNT-1))); do
            BG_FILE_NAME=$(jq -r ".timeline[${sceneIdx}].background_image // \"\"" manifest.json)
            BG_PATH="images/${BG_FILE_NAME}"
            if [ ! -f "$BG_PATH" ]; then
              BG_PATH=$(ls images/scene*_bg.png 2>/dev/null | head -1)
            fi
            DIALOG_COUNT=$(jq ".timeline[${sceneIdx}].dialogs | length" manifest.json)
            echo "Scene $sceneIdx: BG=$BG_PATH dialogs=$DIALOG_COUNT"

            for dIdx in $(seq 0 $((DIALOG_COUNT-1))); do
              D=$(jq -c ".timeline[${sceneIdx}].dialogs[${dIdx}]" manifest.json)
              CHAR=$(echo "$D" | jq -r '.character // "NYBEL"')
              EMO=$(echo "$D" | jq -r '.emotion // "talking"')
              POSE_FN=$(echo "$D" | jq -r '.pose_file // ""')
              VOICE_FN=$(echo "$D" | jq -r '.voice_file // ""')
              CAPTION=$(echo "$D" | jq -r '.caption // ""' | tr -d '\n\r' | head -c 250 | sed 's/[\\:]//g')
              # Word-wrap caption ke max 50 char per line untuk readable subtitle
              CAPTION=$(echo "$CAPTION" | fold -s -w 50 | awk '{printf "%s%s", $0, (NR<=2 ? "\n" : "")}' | head -c 200)
              WORD_COUNT=$(echo "$CAPTION" | wc -w)

              VOICE_PATH="voice/${VOICE_FN}"
              if [ ! -f "$VOICE_PATH" ]; then
                echo "⚠️  No voice for shot ${shotIdx}, skip"
                continue
              fi
              SHOT_DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$VOICE_PATH" 2>/dev/null || echo "3")
              SHOT_DUR_INT=$(printf "%.0f" "$SHOT_DUR")
              [ -z "$SHOT_DUR_INT" ] || [ "$SHOT_DUR_INT" -lt 2 ] && SHOT_DUR_INT=3

              # ============================================================
              # NEW APPROACH: 4 generated frames (already include characters full body)
              # → FFmpeg minterpolate jadi 4-detik video bergerak
              # ============================================================
              FRAME0="images/scene$(printf '%02d' $sceneIdx)_dialog$(printf '%02d' $dIdx)_frame0.png"
              FRAME1="images/scene$(printf '%02d' $sceneIdx)_dialog$(printf '%02d' $dIdx)_frame1.png"
              FRAME2="images/scene$(printf '%02d' $sceneIdx)_dialog$(printf '%02d' $dIdx)_frame2.png"
              FRAME3="images/scene$(printf '%02d' $sceneIdx)_dialog$(printf '%02d' $dIdx)_frame3.png"

              # Validasi: minimum 1 frame harus ada
              VALID_FRAMES=()
              for fr in "$FRAME0" "$FRAME1" "$FRAME2" "$FRAME3"; do
                [ -f "$fr" ] && [ -s "$fr" ] && VALID_FRAMES+=("$fr")
              done

              if [ ${#VALID_FRAMES[@]} -eq 0 ]; then
                echo "⚠️  Shot ${shotIdx}: NO FRAMES, skip"
                continue
              fi

              echo "Shot ${shotIdx}: ${#VALID_FRAMES[@]} frames available, char=${CHAR} emo=${EMO} dur=${SHOT_DUR_INT}s"

              # Setup name tag berdasarkan character aktif
              if [ "$CHAR" = "NYBEL" ]; then
                NAME_TAG="NYBEL — Penjelas"
              else
                NAME_TAG="NYBELIC — Sidekick"
              fi

              # Pre-calculate Y positions
              BOX_Y=$((H - SUB_HEIGHT))
              CAP_Y=$((H - SUB_HEIGHT + 80))
              NAME_Y=$((H - SUB_HEIGHT + 20))

              # Save caption + name tag ke file
              printf '%s' "$CAPTION" > caption_${shotIdx}.txt
              printf '%s' "$NAME_TAG" > nametag_${shotIdx}.txt

              # ============================================================
              # MORPH FRAMES jadi video bergerak pakai concat + minterpolate
              # ============================================================
              # Setiap frame ditampilkan SHOT_DUR/N detik, lalu minterpolate motion-blend antar frame
              FRAMES_PER_SEG=$(echo "scale=2; ${SHOT_DUR_INT} / ${#VALID_FRAMES[@]}" | bc)

              > frame-list-${shotIdx}.txt
              for fr in "${VALID_FRAMES[@]}"; do
                echo "file '${fr}'" >> frame-list-${shotIdx}.txt
                echo "duration ${FRAMES_PER_SEG}" >> frame-list-${shotIdx}.txt
              done
              # Last frame harus di-repeat untuk fix concat duration bug
              LAST_FRAME="${VALID_FRAMES[-1]}"
              echo "file '${LAST_FRAME}'" >> frame-list-${shotIdx}.txt

              # Concat semua frame ke 1 video, lalu minterpolate untuk motion-blend smooth
              # minterpolate mi_mode=mci → motion-compensated interpolation
              # Hasilnya: karakter "morph" antar pose → keliatan bergerak natural
              ffmpeg -y -f concat -safe 0 -i frame-list-${shotIdx}.txt \
                -vf "scale=${W}:${H}:force_original_aspect_ratio=increase,crop=${W}:${H},setsar=1,fps=${FPS},minterpolate=fps=${FPS}:mi_mode=mci:mc_mode=aobmc:me_mode=bidir:vsbmc=1" \
                -t $SHOT_DUR_INT -c:v libx264 -pix_fmt yuv420p -preset fast \
                shot_morphed_${shotIdx}.mp4

              # Cek hasil morph valid
              if [ ! -s shot_morphed_${shotIdx}.mp4 ]; then
                echo "⚠️  Morph failed, fallback to simple concat without minterpolate"
                ffmpeg -y -f concat -safe 0 -i frame-list-${shotIdx}.txt \
                  -vf "scale=${W}:${H}:force_original_aspect_ratio=increase,crop=${W}:${H},setsar=1,fps=${FPS}" \
                  -t $SHOT_DUR_INT -c:v libx264 -pix_fmt yuv420p -preset fast \
                  shot_morphed_${shotIdx}.mp4
              fi

              # ============================================================
              # Add Ken Burns subtle zoom + camera shake + caption + name tag
              # ============================================================
              CAM_SHAKE_X="3*sin(2*PI*t/0.7)+2*sin(2*PI*t/1.3)"
              CAM_SHAKE_Y="2*sin(2*PI*t/0.9)+2*sin(2*PI*t/1.1)"

              FILTER="[0:v]crop=iw-20:ih-20:'10+${CAM_SHAKE_X}':'10+${CAM_SHAKE_Y}',scale=${W}:${H},setsar=1[shaken];"
              FILTER="${FILTER}[shaken]drawbox=x=0:y=${BOX_Y}:w=iw:h=${SUB_HEIGHT}:color=black@0.72:t=fill[boxed];"
              FILTER="${FILTER}[boxed]drawtext=textfile=nametag_${shotIdx}.txt:fontfile='${FONT_PATH}':fontsize=${FONT_NAME}:fontcolor=0x${BRAND_ACCENT}:x=40:y=${NAME_Y}[named];"
              FILTER="${FILTER}[named]drawtext=textfile=caption_${shotIdx}.txt:fontfile='${FONT_PATH}':fontsize=${FONT_CAP}:fontcolor=white:x=(w-text_w)/2:y=${CAP_Y}:line_spacing=12[v]"

              ffmpeg -y \
                -i shot_morphed_${shotIdx}.mp4 \
                -i "$VOICE_PATH" \
                -filter_complex "$FILTER" \
                -map "[v]" -map 1:a \
                -c:v libx264 -pix_fmt yuv420p -preset fast \
                -c:a aac -b:a 128k \
                -t $SHOT_DUR_INT \
                shot_${shotIdx}.mp4

              ffmpeg -y -i shot_${shotIdx}.mp4 -vn -ar 44100 -ac 2 -b:a 128k -c:a libmp3lame shot_${shotIdx}.mp3 2>/dev/null

              echo "file 'shot_${shotIdx}.mp4'" >> shots-list.txt
              echo "file 'shot_${shotIdx}.mp3'" >> audio-list.txt
              echo "✅ Shot ${shotIdx}: scene=${sceneIdx} dialog=${dIdx} char=${CHAR} emotion=${EMO} dur=${SHOT_DUR_INT}s frames=${#VALID_FRAMES[@]}"
              shotIdx=$((shotIdx+1))
            done
          done

          # ===========================================================
          # 3.4 CTA OUTRO CARD (5 detik akhir)
          # ===========================================================
          CTA_TEXT=$(jq -r '.cta_text // "Cek psikotes di nybelic.com"' manifest.json | head -c 200 | sed "s/['\"\\\\:]//g")
          CTA_VOICE="voice/zzz_cta_nybel.mp3"

          if [ -f "$CTA_VOICE" ]; then
            CTA_DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$CTA_VOICE" 2>/dev/null || echo "5")
            CTA_DUR_INT=$(printf "%.0f" "$CTA_DUR")
            [ -z "$CTA_DUR_INT" ] || [ "$CTA_DUR_INT" -lt 3 ] && CTA_DUR_INT=5
          else
            CTA_DUR_INT=5
            ffmpeg -y -f lavfi -i anullsrc=r=44100:cl=stereo -t 5 -q:a 9 -acodec libmp3lame "$CTA_VOICE" 2>/dev/null
          fi

          NYBEL_POINTING="characters/nybel-pointing.png"
          [ ! -f "$NYBEL_POINTING" ] && NYBEL_POINTING="characters/nybel-talking.png"
          [ ! -f "$NYBEL_POINTING" ] && NYBEL_POINTING=$(ls characters/nybel-*.png 2>/dev/null | head -1)
          NYBELIC_EXC="characters/nybelic-excited.png"
          [ ! -f "$NYBELIC_EXC" ] && NYBELIC_EXC=$(ls characters/nybelic-*.png 2>/dev/null | head -1)

          # CTA card: gradient + judul "Cek Psikotes" + URL gede + dua karakter pointing
          CHAR_W=$((W * CHAR_W_PCT / 100))
          # CTA texts via files (avoid shell escaping)
          printf 'Cek Psikotes Anda Sekarang' > cta_title.txt
          printf '%s' "$WEBSITE" > cta_url.txt
          printf '%s' "$CTA_TEXT" > cta_caption.txt

          ffmpeg -y \
            -f lavfi -i "gradients=size=${W}x${H}:duration=${CTA_DUR_INT}:speed=0.06:c0=0x${BRAND_PRIMARY}:c1=0x${BRAND_SECONDARY}:c2=0x${BRAND_ACCENT}:r=${FPS}" \
            -loop 1 -t $CTA_DUR_INT -i "$NYBEL_POINTING" \
            -loop 1 -t $CTA_DUR_INT -i "$NYBELIC_EXC" \
            -i "$CTA_VOICE" \
            -filter_complex "[1:v]scale=${CHAR_W}:-1[n1];[2:v]scale=${CHAR_W}:-1[n2];[0:v][n1]overlay=x=40:y='H-h-30+8*sin(2*PI*t/0.5)'[a1];[a1][n2]overlay=x='W-w-40':y='H-h-30+8*sin(2*PI*t/0.5+1)'[a2];[a2]drawtext=textfile=cta_title.txt:fontfile='${FONT_PATH}':fontsize=${FONT_BIG}:fontcolor=white:borderw=5:bordercolor=black@0.6:x=(w-text_w)/2:y=120,drawtext=textfile=cta_url.txt:fontfile='${FONT_PATH}':fontsize=${FONT_BIG}:fontcolor=0x${BRAND_ACCENT}:borderw=5:bordercolor=white@0.8:x=(w-text_w)/2:y=240,drawtext=textfile=cta_caption.txt:fontfile='${FONT_PATH}':fontsize=${FONT_CAP}:fontcolor=white:borderw=3:bordercolor=black@0.5:x=(w-text_w)/2:y=380:line_spacing=12[v]" \
            -map "[v]" -map 3:a \
            -c:v libx264 -pix_fmt yuv420p -preset fast \
            -c:a aac -b:a 128k \
            -t $CTA_DUR_INT \
            cta_card.mp4

          ffmpeg -y -i cta_card.mp4 -vn -ar 44100 -ac 2 -b:a 128k -c:a libmp3lame cta_card.mp3 2>/dev/null
          echo "file 'cta_card.mp4'" >> shots-list.txt
          echo "file 'cta_card.mp3'" >> audio-list.txt

          # ===========================================================
          # 3.5 CONCAT semua shots ke video final
          # ===========================================================
          ffmpeg -y -f concat -safe 0 -i shots-list.txt -c copy final_video.mp4 || \
            ffmpeg -y -f concat -safe 0 -i shots-list.txt -c:v libx264 -c:a aac final_video.mp4

          # ===========================================================
          # 3.6 Mix audio + background music (-25dB ducking)
          # ===========================================================
          BGM="music/bgm.mp3"
          BGM_VALID=0
          if [ -f "$BGM" ]; then
            # Validate BGM: cek apakah punya audio stream valid
            BGM_DUR=$(ffprobe -v error -analyzeduration 5000000 -probesize 5000000 -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$BGM" 2>/dev/null || echo "0")
            BGM_CHANNELS=$(ffprobe -v error -analyzeduration 5000000 -probesize 5000000 -select_streams a:0 -show_entries stream=channels -of default=noprint_wrappers=1:nokey=1 "$BGM" 2>/dev/null || echo "0")
            if [ "$(echo "$BGM_DUR > 0.5" | bc 2>/dev/null || echo 0)" = "1" ] && [ "$BGM_CHANNELS" -ge 1 ]; then
              BGM_VALID=1
              echo "✅ BGM valid: ${BGM_DUR}s, ${BGM_CHANNELS}ch"
            else
              echo "⚠️  BGM corrupt (dur=$BGM_DUR ch=$BGM_CHANNELS), skip music mixing"
            fi
          fi

          if [ "$BGM_VALID" = "1" ]; then
            FINAL_DUR=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 final_video.mp4)
            FINAL_DUR_INT=$(printf "%.0f" "$FINAL_DUR")
            ffmpeg -y -stream_loop -1 -i "$BGM" -t $FINAL_DUR_INT -af "volume=-25dB" bgm_loop.mp3 2>/dev/null && \
            ffmpeg -y -i final_video.mp4 -i bgm_loop.mp3 \
              -filter_complex "[0:a][1:a]amix=inputs=2:duration=first:dropout_transition=2[aout]" \
              -map 0:v -map "[aout]" \
              -c:v copy -c:a aac -b:a 192k \
              "../../output/${JOB_ID}.mp4" || cp final_video.mp4 "../../output/${JOB_ID}.mp4"
          else
            cp final_video.mp4 "../../output/${JOB_ID}.mp4"
          fi

          ls -la "../../output/"
          ffprobe -v error -show_entries format=duration,size -of default=noprint_wrappers=1 "../../output/${JOB_ID}.mp4" || true
          echo "✅ Render complete (Kok-Bisa style)"

      # ===========================================================
      # 4. UPLOAD TO HOSTINGER (FTP optional)
      # ===========================================================
      - name: Upload to Hostinger via FTP
        env:
          FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USER }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASS }}
          FTP_PATH: ${{ secrets.HOSTINGER_FTP_PATH }}
          JOB_ID: ${{ inputs.job_id }}
        run: |
          if [ -n "$FTP_HOST" ] && [ -n "$FTP_USER" ] && [ -n "$FTP_PASS" ]; then
            REMOTE_DIR="${FTP_PATH:-public_html/uploads/content-auto/output}"
            curl -T "output/${JOB_ID}.mp4" \
              --user "${FTP_USER}:${FTP_PASS}" \
              --ftp-create-dirs \
              "ftp://${FTP_HOST}/${REMOTE_DIR}/${JOB_ID}.mp4" \
              && echo "✅ FTP upload OK" \
              || echo "⚠️  FTP upload failed (non-fatal)"
          else
            echo "⏭️  FTP secrets not configured, skip upload"
          fi

      # ===========================================================
      # 5. ARTIFACT (always)
      # ===========================================================
      - name: Upload as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ inputs.job_id }}
          path: output/*.mp4
          retention-days: 7

      # ===========================================================
      # 6. CALLBACK
      # ===========================================================
      - name: Notify Hostinger callback
        if: always()
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          JOB_ID: ${{ inputs.job_id }}
        run: |
          if [ -n "$CALLBACK_URL" ]; then
            curl -sG "$CALLBACK_URL" \
              --data-urlencode "job_id=$JOB_ID" \
              --data-urlencode "status=${{ job.status }}" \
              --data-urlencode "run_id=${{ github.run_id }}" \
              || true
          fi
